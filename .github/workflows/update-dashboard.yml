name: Update L1 Health Dashboard

on:
  schedule:
    # Runs every day at 06:00 UTC
    - cron: "0 6 * * *"
  workflow_dispatch:       # lets you click "Run workflow" in GitHub UI anytime

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write      # needed to push the updated HTML

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install duckdb

      - name: Run update script
        run: python update_dashboard.py

      - name: Commit & push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add filecoin_l1_health_dashboard.html
          git diff --cached --quiet || git commit -m "Auto-update dashboard data $(date -u +%Y-%m-%d)"
          git push
